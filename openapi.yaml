  /transactions:
    get:
      summary: List transactions
      operationId: getTransactions
      description: |
        Returns a paginated list of transactions (trades, cash movements, transfers) from the broker portfolio.
        Filter by ISIN, type, status, or free-text search. Pass the returned `cursor` to fetch the next page.
      security:
        - GatewayToken: []
      parameters:
        - name: pageSize
          in: query
          schema:
            type: number
            default: 20
          description: Number of transactions to return.
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from a previous response. Omit for the first page.
        - name: isin
          in: query
          schema:
            type: string
          description: Filter to transactions for a specific ISIN.
          example: NL0010273215
        - name: searchTerm
          in: query
          schema:
            type: string
          description: Free-text search across transaction descriptions.
        - name: type
          in: query
          schema:
            type: string
          description: Comma-separated list of transaction types to include.
          example: "SECURITY_TRANSACTION,CASH_TRANSACTION"
        - name: status
          in: query
          schema:
            type: string
          description: Comma-separated list of statuses to include.
          example: "SETTLED"
      responses:
        '200':
          description: Paginated transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                      brokerPortfolio:
                        type: object
                        properties:
                          id:
                            type: string
                          moreTransactions:
                            $ref: '#/components/schemas/TransactionPage'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'

  /transactions/{id}:
    get:
      summary: Transaction details
      operationId: getTransactionDetails
      description: |
        Returns full details for a single broker transaction by its ID.
        The shape of the response varies by transaction type (`BrokerSecurityTransaction`,
        `BrokerCashTransaction`, `BrokerNonTradeSecurityTransaction`, `BrokerEltifTransaction`).
      security:
        - GatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Transaction ID as returned by the list endpoint.
          example: eaRxyCqrq3qSWd697eV7Xh
      responses:
        '200':
          description: Transaction detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                      brokerPortfolio:
                        type: object
                        properties:
                          id:
                            type: string
                          transactionDetails:
                            type: object
                            description: Transaction detail; shape depends on the concrete type.
                            properties:
                              id:
                                type: string
                              currency:
                                type: string
                              type:
                                type: string
                                enum: [SECURITY_TRANSACTION, CASH_TRANSACTION, NON_TRADE_SECURITY_TRANSACTION, ELTIF_TRANSACTION]
                              lastEventDateTime:
                                type: string
                                format: date-time
                              isPending:
                                type: boolean
                              isCancellation:
                                type: boolean
                              transactionReference:
                                type: string
                              documents:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    url:
                                      type: string
                                    label:
                                      type: string
                              security:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  name:
                                    type: string
                                  isin:
                                    type: string
        '400':
          description: Invalid transaction id format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'

  /transactions/documents/{id}:
    get:
      summary: Download transaction document
      operationId: downloadTransactionDocument
      description: |
        Proxy-downloads a transaction document PDF from Scalable Capital's download API.
        The `id` is the document ID from the `documents` array in the transaction details response.

        To get the correct file, also pass the three optional query parameters that the server uses
        to build Scalable's internal download path:
        - `date` — date portion of `lastEventDateTime` (e.g. `2026-03-26`)
        - `label` — document label from the `documents` array (e.g. `Kosteninformation`)
        - `isin` — ISIN from `security.isin` (e.g. `IE00B3RBWM25`)

        All three must be supplied together or omitted together. If omitted, the document ID is
        used as the path segment (may work for some documents).
      security:
        - GatewayToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Document ID from the transaction details `documents[].id` field.
          example: iRRfCi1iMGpLu2aZQKnKfY
        - name: date
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Date portion of `lastEventDateTime` from the transaction details.
          example: '2026-03-26'
        - name: label
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
            pattern: '^[A-Za-z0-9_-]+$'
          description: Document label from the transaction details `documents[].label` field.
          example: Kosteninformation
        - name: isin
          in: query
          required: false
          schema:
            type: string
          description: ISIN from the transaction details `security.isin` field.
          example: IE00B3RBWM25
      responses:
        '200':
          description: PDF document binary
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid id, or invalid/incomplete date+label+isin combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream returned a non-2xx status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

