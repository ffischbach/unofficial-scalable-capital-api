      operationId: getAppropriatenessResult
      description: |
        Returns the MiFID II appropriateness assessment result for the portfolio
        (`getAppropriatenessResult` operation).
      security:
        - GatewayToken: []
      responses:
        '200':
          description: Appropriateness assessment
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      brokerPortfolio:
                        type: object
                        properties:
                          appropriatenessInfo:
                            type: object
                            properties:
                              id:
                                type: string
                              appropriatenessId:
                                type: string
                              result:
                                type: string
                                example: NOT_APPROPRIATE
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'

  /portfolio/crypto-performance:
    get:
      summary: Crypto performance
      operationId: getCryptoPerformance
      description: |
        Returns crypto holdings valuation and unrealised return since buy
        (`getCryptoPerformance` operation). Values are 0 if no crypto is held.
      security:
        - GatewayToken: []
      responses:
        '200':
          description: Crypto performance
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      brokerPortfolio:
                        type: object
                        properties:
                          valuation:
                            type: object
                            properties:
                              id:
                                type: string
                              cryptoValuation:
                                type: number
                                example: 0
                              cryptoUnrealisedReturnSinceBuy:
                                type: object
                                properties:
                                  absoluteUnrealisedReturn:
                                    type: number
                                  relativeUnrealisedReturn:
                                    type: number
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'

  /savings:
    get:
      summary: Savings account overview
      operationId: getSavings
      description: |
        Returns the current balance, nominal and effective interest rates, next payout date,
        and accrued interest for the Tagesgeld (overnight savings) account.
        Returns 503 if the session has no savings account.
      security:
        - GatewayToken: []
      responses:
        '200':
          description: Savings account overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingsOverview'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'
        '503':
          description: No savings account found in the current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /savings/transactions:
    get:
      summary: Savings account transactions
      operationId: getSavingsTransactions
      description: |
        Returns recent cash transactions for the Tagesgeld account (deposits, withdrawals,
        interest payouts). Uses the `OvernightOverviewPageData` GraphQL operation.
        Returns 503 if the session has no savings account.
      security:
        - GatewayToken: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of transactions to return.
      responses:
        '200':
          description: List of savings transactions
          content:
            application/json:
              schema:
                type: object
                required: [transactions]
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SavingsTransaction'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'
        '503':
          description: No savings account found in the current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /portfolio/timeseries:
    get:
      summary: Portfolio time-weighted return timeseries
      operationId: getPortfolioTimeseries
      description: |
        Returns portfolio value and absolute return time series across all standard timeframes
        (`timeWeightedReturn` operation). Each timeframe has a closing reference point and a list of
        intraday/daily data points.
      security:
        - GatewayToken: []
      parameters:
        - name: includeYearToDate
          in: query
          schema:
            type: boolean
          description: When true, includes the YEAR_TO_DATE timeframe in the response.
      responses:
        '200':
          description: Portfolio timeseries
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      brokerPortfolio:
                        type: object
                        properties:
                          timeseries:
                            type: array
                            items:
                              $ref: '#/components/schemas/PortfolioTimeseriesOverTime'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Upstream GraphQL errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphQLErrors'
